<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>You're Quests Pro – Quests</title>
    <meta name="description" content="Welcome to Quests Pro. Redirecting you back to the app." />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#04102a" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --blue-900: #04102a;
        --blue-800: #14213c;
        --accent: #3366cc;
        --accent-light: #5c85d6;
        --accent-success: #34c759;
        --text-strong: #ffffff;
        --text-muted: #a7b1d0;
        --text-soft: rgba(167, 177, 208, 0.6);
        --surface-strong: rgba(32, 44, 79, 0.92);
        --surface-medium: rgba(32, 44, 79, 0.78);
        --border-strong: rgba(48, 61, 98, 0.95);
        --border-soft: rgba(48, 61, 98, 0.6);
        --border-accent: rgba(92, 133, 214, 0.35);
        --shadow-lg: 0 40px 90px -35px rgba(4, 16, 42, 0.7);
        --shadow-md: 0 24px 60px -30px rgba(6, 22, 58, 0.55);
        --pill-radius: 999px;
        --card-radius: 24px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { -webkit-text-size-adjust: 100%; background: #04102a; }

      body {
        font-family: "Manrope", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text-strong);
        background: linear-gradient(145deg, var(--blue-900) 0%, var(--blue-800) 60%, #1a3a7d 100%);
        background-attachment: fixed;
        min-height: 100vh;
        min-height: 100dvh;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      a { color: inherit; text-decoration: none; }
      a:hover { filter: brightness(1.05); }

      .page-bg {
        position: fixed;
        inset: -100px;
        z-index: -1;
        background:
          radial-gradient(circle at 20% 20%, rgba(92, 133, 214, 0.1), transparent 55%),
          radial-gradient(circle at 78% -10%, rgba(102, 136, 238, 0.08), transparent 45%),
          linear-gradient(145deg, var(--blue-900) 0%, var(--blue-800) 60%, #1a3a7d 100%);
      }

      .page {
        position: relative;
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        padding-top: calc(env(safe-area-inset-top, 0px) + 40px);
        padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
      }

      .card {
        background: var(--surface-strong);
        border: 1px solid var(--border-strong);
        border-radius: 28px;
        padding: 48px 40px;
        box-shadow: var(--shadow-md);
        text-align: center;
        max-width: 480px;
        width: 100%;
        animation: fadeInUp 0.5s ease-out;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .success-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 22px;
        border-radius: 50%;
        background: rgba(52, 199, 89, 0.14);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 38px;
        color: var(--accent-success);
        animation: checkPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      @keyframes checkPop {
        0%   { transform: scale(0); opacity: 0; }
        60%  { transform: scale(1.15); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }

      .title {
        font-family: "Bricolage Grotesque", sans-serif;
        font-size: clamp(1.6rem, 5vw, 2.1rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.2;
        margin: 0 0 12px;
        color: var(--text-strong);
      }

      .subtitle {
        font-size: 1rem;
        color: var(--text-muted);
        line-height: 1.6;
        margin: 0 0 28px;
      }

      .fallback {
        opacity: 0;
        transition: opacity 0.4s ease;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .fallback.is-visible { opacity: 1; }

      .fallback__hint {
        font-size: 0.85rem;
        color: var(--text-soft);
        line-height: 1.5;
        margin: 0 0 4px;
      }

      .cta-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 15px 28px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
        color: var(--text-strong);
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        text-align: center;
        border: none;
        cursor: pointer;
        box-shadow: var(--shadow-lg);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .cta-button:hover { transform: translateY(-3px); }
      .cta-button:active { transform: translateY(0); }
      .cta-button__icon { font-size: 18px; line-height: 1; }

      .reopen-link {
        display: block;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-muted);
        padding: 8px;
        cursor: pointer;
      }

      .reopen-link:hover { color: var(--accent-light); }

      .footer__meta {
        margin-top: 28px;
        font-size: 11px;
        color: var(--text-soft);
        letter-spacing: 0.08em;
      }

      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>

    <div class="page">
      <main class="card" role="main">
        <div class="success-icon" aria-hidden="true"><i class="mdi mdi-check-bold"></i></div>
        <h1 class="title">You're Quests Pro</h1>
        <p class="subtitle" id="status-text">Redirecting you back to the Quests app...</p>

        <div class="fallback" id="fallback">
          <p class="fallback__hint">Didn't reopen automatically?</p>
          <button class="cta-button" type="button" id="reopen-cta">
            <span class="cta-button__icon" aria-hidden="true"><i class="mdi mdi-arrow-right-circle"></i></span>
            <span>Reopen Quests</span>
          </button>
          <a class="reopen-link" id="store-link" href="https://apps.apple.com/us/app/quests-social-habit-tracking/id6745767553">
            Get the app from the App Store
          </a>
        </div>

        <p class="footer__meta">© 2026 Nothing Serious LLC</p>
      </main>
    </div>

    <script>
      (function () {
        var APP_STORE_URL = 'https://apps.apple.com/us/app/quests-social-habit-tracking/id6745767553';
        var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=info.nothingserious.quests';

        // Resolve the app's custom scheme from ?env (staging dev-client vs prod build).
        var params = new URLSearchParams(window.location.search);
        var env = params.get('env');
        var scheme = env === 'staging' ? 'quests-staging' : 'info.nothingserious.quests';
        var deepLink = scheme + '://pro-upgrade-success';

        // Platform detection for the store fallback (mirrors q/index.html).
        function detectPlatform() {
          var ua = (navigator.userAgent || '').toLowerCase();
          if (/android/.test(ua)) return 'android';
          if (/iphone|ipad|ipod/.test(ua)) return 'ios';
          if (ua.indexOf('mac') >= 0 && navigator.maxTouchPoints > 1) return 'ios';
          return 'desktop';
        }
        var platform = detectPlatform();
        var STORE_URL = platform === 'android' ? PLAY_STORE_URL : APP_STORE_URL;

        // Point the store fallback link at the right store + label it.
        var storeLink = document.getElementById('store-link');
        if (storeLink) {
          storeLink.href = STORE_URL;
          storeLink.textContent =
            platform === 'android'
              ? 'Get the app from Google Play'
              : 'Get the app from the App Store';
        }

        // "Reopen Quests" re-fires the deep link on demand.
        var reopenBtn = document.getElementById('reopen-cta');
        if (reopenBtn) {
          reopenBtn.addEventListener('click', function () {
            window.location.href = deepLink;
          });
        }

        // Fire the deep link on load to bounce back into the app.
        window.location.href = deepLink;

        // After ~2.5s (the app didn't take over), reveal the manual fallback.
        setTimeout(function () {
          var statusText = document.getElementById('status-text');
          if (statusText) {
            statusText.textContent = 'You can head back to the Quests app to continue.';
          }
          var fallback = document.getElementById('fallback');
          if (fallback) fallback.classList.add('is-visible');
        }, 2500);
      })();
    </script>
  </body>
</html>
